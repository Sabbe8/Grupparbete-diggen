<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Drone Order</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f7f4;
    }

    .header {
      background: linear-gradient(90deg, #1f7a4d, #2ecc71);
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: flex;
      justify-content: center;
      margin-top: 70px;
    }

    .card {
      background: white;
      padding: 35px;
      border-radius: 14px;
      width: 360px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      border-top: 6px solid #2ecc71;
      text-align: center;
    }

    .user {
      margin-bottom: 20px;
      color: #555;
    }

    h2 {
      color: #1f7a4d;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #2ecc71;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #27ae60;
      transform: scale(1.02);
    }
  </style>
</head>

<body>

<div class="header">
  🚁 Drone Delivery System
</div>

<div class="container">
  <div class="card">

    <div class="user">
      Logged in as: <b>{{ farmer }}</b>
    </div>

    <h2>Send Drone Mission</h2>

    <form method="POST" action="/send_order/{{ farmer }}">
      <button type="submit">🚀 Launch Drone</button>
    </form>

  </div>
</div>

</body>
</html>
