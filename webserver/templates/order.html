<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Order Drone</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f4f8;
    }

    .header {
      background: #2a5298;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      display: flex;
      justify-content: center;
      margin-top: 60px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #218838;
    }

    .user {
      margin-bottom: 20px;
      color: #555;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>Drone Control System</h1>
</div>

<div class="container">
  <div class="card">

    <div class="user">
      Logged in as: <b>{{ farmer }}</b>
    </div>

    <h2>Send Drone Mission</h2>

    <form method="POST" action="/send_order/{{ farmer }}">
      <button type="submit">🚁 Send Drone</button>
    </form>

  </div>
</div>

</body>
</html>
