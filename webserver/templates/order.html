<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TerraScan Order</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f3f7f4;
}

/* header */
.header {
  background: #2ecc71;
  color: white;
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
}

/* center container */
.container {
  display: flex;
  justify-content: center;
  margin-top: 80px;
}

/* card */
.card {
  background: white;
  padding: 35px;
  border-radius: 12px;
  width: 360px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  text-align: center;
}

/* logged in text */
.user {
  margin-bottom: 15px;
  color: #555;
}

/* inputs */
input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  border: 1px solid #ddd;
}

/* button */
button {
  width: 100%;
  padding: 12px;
  background: #2ecc71;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #27ae60;
}
</style>

</head>

<body>

<div class="header">
TerraScan
</div>

<div class="container">

<div class="card">

<div class="user">
Logged in as: <b>{{ farmer }}</b>
</div>

<h3>Send Drone Mission</h3>

<form method="POST" action="/send_order/{{ farmer }}">

<input name="from_long" placeholder="From longitude" required>
<input name="from_lat" placeholder="From latitude" required>

<input name="to_long" placeholder="To longitude" required>
<input name="to_lat" placeholder="To latitude" required>

<button type="submit">Launch Drone</button>

</form>

</div>

</div>

</body>
</html>
