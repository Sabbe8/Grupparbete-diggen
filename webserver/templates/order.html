<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TerraScan Order</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f3f7f4;
}

.header {
  background: #2ecc71;
  color: white;
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
  text-align: center;
}

.container {
  display: flex;
  justify-content: center;
  margin-top: 80px;
}

.card {
  background: white;
  padding: 35px;
  border-radius: 12px;
  width: 360px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  text-align: center;
}

.user {
  margin-bottom: 15px;
  color: #555;
}

button {
  width: 100%;
  padding: 12px;
  background: #2ecc71;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #27ae60;
}
</style>
</head>

<body>

<div class="header">
TerraScan
</div>

<div class="container">

<div class="card">

<div class="user">
Logged in as: <b>{{ farmer }}</b>
</div>

<h3>Send Drone Mission</h3>

<!-- 🚁 ENDA KNAPPEN -->
<form method="POST" action="/send_order/{{ farmer }}">
  <button type="submit">Launch Drone</button>
</form>

</div>

</div>

</body>
</html>
