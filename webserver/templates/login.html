<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f3f7f4;
    }

    /* 🔥 ADMIN KNAPP */
    .admin-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #2ecc71;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .login-box {
      background: white;
      display: inline-block;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    input {
      width: 200px;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 220px;
      padding: 10px;
      background: #2ecc71;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #27ae60;
    }

    .title {
      margin-bottom: 20px;
      color: #1f7a4d;
    }
  </style>
</head>

<body>

<!-- 🔥 ADMIN KNAPP -->
<a href="/admin/login" class="admin-btn">
  Admin
</a>

<div class="login-box">

  <h2 class="title">Drone System Login</h2>

  <form method="POST">

    <input name="username" placeholder="username" required><br>
    <input name="password" type="password" placeholder="password" required><br><br>

    <button type="submit">Login</button>

  </form>

</div>

</body>
</html>
