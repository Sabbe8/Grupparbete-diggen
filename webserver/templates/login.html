<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f3f7f4;
    }

    .admin-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #2ecc71;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
    }

    input {
      padding: 10px;
      margin: 5px;
    }

    button {
      padding: 10px 20px;
      background: #2ecc71;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<a href="/admin/login" class="admin-btn">Admin</a>

<h1>Login</h1>

<form method="POST">

  <input name="username" placeholder="username"><br>
  <input name="password" type="password" placeholder="password"><br><br>

  <button type="submit">Login</button>

</form>

</body>
</html>
