<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Helvetica;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f3d2e, #1f7a4d);
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 14px;
      width: 340px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
      border-top: 6px solid #2ecc71;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #1f7a4d;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #2ecc71;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2ecc71;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    button:hover {
      background: #27ae60;
    }

    .error {
      color: red;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>TerraScan Login</h1>

  <form method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>
  </form>

  {% if message %}
    <div class="error">{{ message }}</div>
  {% endif %}
</div>

</body>
</html>
