<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

  <meta charset="utf-8">
  <title>TerraScan</title>
</head>

<body>
  <div id="map" style="height: 720px; width: 1200px;"></div>

  <script>
    var map = L.map('map').setView([55.81904, 13.42416], 15);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    }).addTo(map);

    // 🔥 Spara alla drönare
    var droneMarkers = {};

    function updateDrones() {
      $.ajax({
        url: 'http://127.0.0.1:5000/get_drones',
        dataType: 'json',
        success: function(data){

          for (const droneID in data){

            var drone = data[droneID];

            var lat = drone.latitude;
            var lon = drone.longitude;
            var status = drone.status;

            // färg beroende på status
            var color = (status === "idle") ? "green" : "red";

            // om drönare inte finns → skapa
            if (!droneMarkers[droneID]) {

              var marker = L.circleMarker([lat, lon], {
                radius: 8,
                color: color
              }).addTo(map);

              marker.bindPopup("Drone " + droneID);

              droneMarkers[droneID] = marker;

            } else {
              // uppdatera position
              droneMarkers[droneID].setLatLng([lat, lon]);
              droneMarkers[droneID].setStyle({color: color});
            }
          }
        },
        complete: function(){
          setTimeout(updateDrones, 100);
        }
      });
    }

    updateDrones();
  </script>

</body>
</html>
