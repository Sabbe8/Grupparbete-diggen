<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TerraScan</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

<style>
body {
  margin: 0;
  background: #eaf5ee;
  font-family: Arial;
}


.container {
  display: flex;
  height: 100vh;
}


#map {
  flex: 2;
}


#cameraPanel {
  flex: 1;
  background: #ffffff;
  border-left: 3px solid #2ecc71;
  padding: 15px;
  box-shadow: -5px 0 15px rgba(0,0,0,0.1);
}

#cameraPanel h3 {
  color: #1f7a4d;
}


#cameraPanel img {
  width: 100%;
  border-radius: 10px;
  background: black;
}


.admin-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: #2ecc71;
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  text-decoration: none;
  z-index: 9999;
}
</style>
</head>

<body>

<a href="/admin/login" class="admin-btn">Admin</a>

<div class="container">


  <div id="map"></div>


  <div id="cameraPanel">
    <h3>Drone Camera</h3>
    <img id="stream" src="" alt="No camera selected">
  </div>

</div>

<script>

var map = L.map('map').setView([55.81904, 13.42416], 15);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

var droneMarkers = {};


function openCamera(ip) {
  document.getElementById("stream").src =
    "http://" + ip + ":5001/video_feed";
}


function updateDrones() {

  $.ajax({
    url: '/get_drones',
    dataType: 'json',

    success: function(data){

      for (const droneID in data){

        var drone = data[droneID];

        var lat = parseFloat(drone.latitude);
        var lon = parseFloat(drone.longitude);
        var status = drone.status;
        var ip = drone.ip;

        if (isNaN(lat) || isNaN(lon)) continue;

        var color = (status === "idle") ? "#2ecc71" : "#e74c3c";

        if (!droneMarkers[droneID]) {

          let marker = L.circleMarker([lat, lon], {
            radius: 9,
            color: color,
            fillColor: color,
            fillOpacity: 0.9,
            weight: 2
          }).addTo(map);

          marker.bindPopup("Drone " + droneID);

  
          marker.on("click", function() {
            openCamera(ip);
          });

          droneMarkers[droneID] = marker;

        } else {

          droneMarkers[droneID].setLatLng([lat, lon]);
          droneMarkers[droneID].setStyle({
            color: color,
            fillColor: color
          });
        }
      }
    },

    complete: function(){
      setTimeout(updateDrones, 100);
    }
  });
}

updateDrones();

</script>

</body>
</html>
