<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Drone in Lund</title>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>  

  <!-- Lägg drönare på SVG -->
  <script type="text/javascript">
    function LoadDrone(droneID, 200, 200, status) {
      var svg = document.getElementById("map-svg");
      if (!svg) return;

      var circleNode = document.getElementById(droneID);
      var color = (status === 'idle') ? 'green' : 'red';

      if(circleNode === null){
        circleNode = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circleNode.setAttributeNS(null, 'cx', x);
        circleNode.setAttributeNS(null, 'cy', y);
        circleNode.setAttributeNS(null, 'r', '5');
        circleNode.setAttributeNS(null, 'fill', color);
        circleNode.setAttributeNS(null, 'id', droneID);
        svg.appendChild(circleNode);
      } else {
        circleNode.setAttributeNS(null, 'cx', x);
        circleNode.setAttributeNS(null, 'cy', y);
        circleNode.setAttributeNS(null, 'fill', color);
      }
    }
  </script>
</head>

<body>
  <h1>Drone Delivery Map</h1>

  <!-- 🗺️ Bara kartan -->
  <object id="map" type="image/svg+xml" data="/static/images/lund-map.svg" width="800" height="600"></object>

  <!-- 🚁 Uppdatera drönare -->
  <script type="text/javascript">
    var set_delay = 100;

    function updateDrones() {
      $.ajax({
        url: 'http://127.0.0.1:5000/get_drones',
        dataType: 'json',
        success: function(server_response){
          for (const droneID in server_response){
            var drone = server_response[droneID];

            var x = drone.longitude;
            var y = drone.latitude;
            var status = drone.status;

            LoadDrone(droneID, x, y, status);
          }
        },
        complete: function(){
          setTimeout(updateDrones, set_delay);
        },
        error: function(err){
          console.log("Kunde inte hämta drönare:", err);
          setTimeout(updateDrones, set_delay);
        }
      });
    }

    // Vänta på att SVG laddas
    document.getElementById("map").addEventListener("load", function() {
      var svgDoc = document.getElementById("map").contentDocument;

      if(svgDoc) {
        var svg = svgDoc.documentElement;
        svg.setAttribute("id", "map-svg");

        updateDrones(); // starta loop
      }
    });
  </script>

</body>
</html>
