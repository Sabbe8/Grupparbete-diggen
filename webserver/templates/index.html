<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TerraScan</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #eaf5ee;
      font-family: Arial;
    }

    #map {
      height: 720px;
      width: 1200px;
      margin: 20px auto;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      border: 3px solid #2ecc71;
    }

    /* 📷 kamera */
    #camera {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 320px;
      height: 240px;
      background: black;
      border-radius: 10px;
      overflow: hidden;
      z-index: 9999;
      display: none;
    }

    #camera img {
      width: 100%;
    }

    #closeCam {
      position: absolute;
      top: 5px;
      right: 8px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .admin-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #2ecc71;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      z-index: 9999;
    }
  </style>
</head>

<body>

<a href="/admin/login" class="admin-btn">Admin</a>

<div id="map"></div>

<!-- 📷 CAMERA WINDOW -->
<div id="camera">
  <div id="closeCam" onclick="closeCamera()">X</div>
  <img id="stream">
</div>

<script>

var map = L.map('map').setView([55.81904, 13.42416], 15);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

var droneMarkers = {};

function openCamera(ip) {
  document.getElementById("camera").style.display = "block";
  document.getElementById("stream").src =
      "http://" + ip + ":8000/video";
}

function closeCamera() {
  document.getElementById("camera").style.display = "none";
  document.getElementById("stream").src = "";
}

function updateDrones() {

  $.ajax({
    url: '/get_drones',
    dataType: 'json',

    success: function(data){

      for (const droneID in data){

        var drone = data[droneID];

        var lat = parseFloat(drone.latitude);
        var lon = parseFloat(drone.longitude);
        var status = drone.status;
        var ip = drone.ip;

        var color = (status === "idle") ? "#2ecc71" : "#e74c3c";

        if (!droneMarkers[droneID]) {

          var marker = L.circleMarker([lat, lon], {
            radius: 9,
            color: color,
            fillColor: color,
            fillOpacity: 0.9,
            weight: 2
          }).addTo(map);

          marker.bindPopup("Drone " + droneID);

          // 📷 klicka för kamera
          marker.on("click", function() {
            openCamera(ip);
          });

          droneMarkers[droneID] = marker;

        } else {

          droneMarkers[droneID].setLatLng([lat, lon]);
          droneMarkers[droneID].setStyle({
            color: color,
            fillColor: color
          });
        }
      }
    },

    complete: function(){
      setTimeout(updateDrones, 1000);
    }
  });
}

updateDrones();

</script>

</body>
</html>
