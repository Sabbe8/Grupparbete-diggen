<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Admin Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f3f7f4;
}

.container {
  display: flex;
  height: 100vh;
}

#map {
  flex: 2;
}

.sidebar {
  flex: 1;
  background: white;
  padding: 15px;
  overflow-y: auto;
}

.header {
  background: #2ecc71;
  color: white;
  padding: 15px;
  font-weight: bold;
}

.drone {
  background: #f3f7f4;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="header">Admin Control</div>

<div class="container">

<div id="map"></div>

<div class="sidebar">
<h3>Drones</h3>
<div id="droneList"></div>
</div>

</div>

<script>

var map = L.map('map').setView([55.81904, 13.42416], 15);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

var markers = {};


map.on('click', function(e) {

    let lat = e.latlng.lat;
    let lng = e.latlng.lng;

    L.marker([lat, lng]).addTo(map)
      .bindPopup("Mission point")
      .openPopup();

    $.ajax({
        url: "/admin/send_mission",
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify({
            lat: lat,
            lng: lng
        }),
        success: function(res) {
            alert("Mission sent!");
        }
    });
});


function updateDrones() {

    $.ajax({
        url: '/get_drones',
        dataType: 'json',

        success: function(data){

            let html = "";

            for (const id in data) {

                let d = data[id];

                let lat = parseFloat(d.latitude);
                let lon = parseFloat(d.longitude);

                let color = d.status === "idle" ? "#2ecc71" : "#e74c3c";

                if (!markers[id]) {
                    markers[id] = L.circleMarker([lat, lon], {
                        radius: 8,
                        color: color,
                        fillColor: color,
                        fillOpacity: 0.9
                    }).addTo(map);
                } else {
                    markers[id].setLatLng([lat, lon]);
                    markers[id].setStyle({color, fillColor: color});
                }

                html += `
                    <div class="drone">
                        <b>${id}</b><br>
                        ${d.status}<br>
                        ${lat.toFixed(4)}, ${lon.toFixed(4)}
                    </div>
                `;
            }

            document.getElementById("droneList").innerHTML = html;
        }
    });

    setTimeout(updateDrones, 100);
}

updateDrones();

</script>

</body>
</html>
