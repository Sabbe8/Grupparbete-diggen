<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Admin Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f3f7f4;
}

.container {
  display: flex;
  height: 100vh;
}

#map {
  flex: 2;
}

.sidebar {
  flex: 1;
  background: white;
  padding: 15px;
  overflow-y: auto;
}

.header {
  background: #2ecc71;
  color: white;
  padding: 15px;
  font-weight: bold;
}

.drone {
  background: #f3f7f4;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

.base-station-icon {
  width: 24px;
  height: 24px;
  background: #2c3e50;
  border: 3px solid white;
  border-radius: 50%;
  box-shadow: 0 0 0 5px rgba(44, 62, 80, 0.25);
}
</style>
</head>

<body>

<div class="header">Admin Control</div>

<div class="container">

<div id="map"></div>

<div class="sidebar">
<h3>Drones</h3>
<div id="droneList"></div>
</div>

</div>

<script>

var map = L.map('map').setView([55.81904, 13.42416], 15);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

var baseIcon = L.divIcon({
  html: '<div class="base-station-icon"></div>',
  className: '',
  iconSize: [30, 30],
  iconAnchor: [15, 15]
});

L.circle([55.81904, 13.42416], {
  radius: 45,
  color: "#2c3e50",
  fillColor: "#95a5a6",
  fillOpacity: 0.20
}).addTo(map);

L.marker([55.81904, 13.42416], {
  icon: baseIcon
}).addTo(map).bindPopup("Base station");

var markers = {};

function loadAllAreas() {
  $.ajax({
    url: '/get_all_areas',
    dataType: 'json',

    success: function(data) {

      for (const user in data) {
        var field = data[user];

        var fieldCoords = field.area.map(function(point) {
          return [point[1], point[0]];
        });

        L.polygon(fieldCoords, {
          color: "#8b6b3f",
          weight: 3,
          fillColor: "#cbb58b",
          fillOpacity: 0.35
        }).addTo(map).bindPopup(user + "'s field");

        if (field.problem) {
          var problem = field.problem;

          L.circleMarker([problem[1], problem[0]], {
            radius: 8,
            color: "red",
            fillColor: "red",
            fillOpacity: 0.95
          }).addTo(map).bindPopup("Detected problem: " + user);
        }
      }
    }
  });
}

loadAllAreas();

map.on('click', function(e) {

    let lat = e.latlng.lat;
    let lng = e.latlng.lng;

    L.marker([lat, lng]).addTo(map)
      .bindPopup("Mission point")
      .openPopup();

    $.ajax({
        url: "/admin/send_mission",
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify({
            lat: lat,
            lng: lng
        }),
        success: function(res) {
            alert("Mission sent!");
        }
    });
});

function updateDrones() {

    $.ajax({
        url: '/get_all_drones',
        dataType: 'json',

        success: function(data){

            let html = "";

            for (const existingID in markers) {
                if (!(existingID in data)) {
                    map.removeLayer(markers[existingID]);
                    delete markers[existingID];
                }
            }

            for (const id in data) {

                let d = data[id];

                let lat = parseFloat(d.latitude);
                let lon = parseFloat(d.longitude);

                if (isNaN(lat) || isNaN(lon)) continue;

                let color = d.status === "idle" ? "#2ecc71" : "#e74c3c";

                if (!markers[id]) {
                    markers[id] = L.circleMarker([lat, lon], {
                        radius: 8,
                        color: color,
                        fillColor: color,
                        fillOpacity: 0.9
                    }).addTo(map);
                } else {
                    markers[id].setLatLng([lat, lon]);
                    markers[id].setStyle({
                        color: color,
                        fillColor: color
                    });
                }

                html += `
                    <div class="drone">
                        <b>Drone ${id}</b><br>
                        Status: ${d.status}<br>
                        Owner: ${d.owner}<br>
                        ${lat.toFixed(4)}, ${lon.toFixed(4)}
                    </div>
                `;
            }

            document.getElementById("droneList").innerHTML = html;
        }
    });

    setTimeout(updateDrones, 100);
}

updateDrones();

</script>

</body>
</html>
