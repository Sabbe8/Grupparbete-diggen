<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body>

<h1>🚁 Admin Panel</h1>

{% for key, drone in drones.items() %}

<div style="border:1px solid #ccc; padding:10px; margin:10px;">

  <p><b>ID:</b> {{ drone.id }}</p>
  <p><b>Status:</b> {{ drone.status }}</p>
  <p><b>IP:</b> {{ drone.ip }}</p>

</div>

{% endfor %}

</body>
</html>
