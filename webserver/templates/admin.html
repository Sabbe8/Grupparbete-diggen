<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    #map {
      flex: 2;
      background: #e5e5e5;
      padding: 20px;
    }

    .sidebar {
      flex: 1;
      background: #f4f4f4;
      padding: 15px;
      overflow-y: auto;
      border-left: 2px solid #ccc;
    }

    .drone {
      background: white;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .idle {
      color: green;
      font-weight: bold;
    }

    .busy {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- MAP -->
  <div id="map">
    <h2>🗺️ Map View</h2>
    <p>(Här kopplar vi in riktig karta senare)</p>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>🚁 Drones</h2>

    {% for key, drone in drones.items() %}

    <div class="drone">

      <p><b>ID:</b> {{ drone.id }}</p>

      <p>
        <b>Status:</b>
        <span class="{{ drone.status }}">
          {{ drone.status }}
        </span>
      </p>

      <p><b>IP:</b> {{ drone.ip }}</p>

      <p><b>Lat:</b> {{ drone.latitude }}</p>
      <p><b>Long:</b> {{ drone.longitude }}</p>

    </div>

    {% endfor %}

  </div>

</div>

</body>
</html>
