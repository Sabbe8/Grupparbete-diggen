<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin</title>

  <style>
    body { margin: 0; font-family: Arial; }

    .container {
      display: flex;
      height: 100vh;
    }

    #map {
      flex: 2;
      background: #e5e5e5;
      padding: 20px;
    }

    .sidebar {
      flex: 1;
      background: #f4f4f4;
      padding: 10px;
      overflow-y: auto;
    }

    .drone {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .busy { color: red; }
    .idle { color: green; }
  </style>
</head>

<body>

<div class="container">

  <div id="map">
    <h2>Map</h2>
  </div>

  <div class="sidebar">

    <h2>Drones</h2>

    {% for key, drone in drones.items() %}

    <div class="drone">
      <p>ID: {{ drone.id }}</p>
      <p>Status: <b class="{{ drone.status }}">{{ drone.status }}</b></p>
      <p>IP: {{ drone.ip }}</p>
    </div>

    {% endfor %}

  </div>

</div>

</body>
</html>
